name: Tag Release

# When a release PR (branch: release/vX.Y.Z) is merged, create the
# git tag. This triggers the existing release.yml GoReleaser workflow.
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    if: >-
      github.event.pull_request.merged &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Extract version and create tag
        run: |
          branch="${{ github.event.pull_request.head.ref }}"
          version="${branch#release/}"

          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Could not extract valid version from branch '$branch'"
            exit 1
          fi

          echo "Tagging $version"
          git tag "$version"
          git push origin "$version"
