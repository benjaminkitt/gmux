<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0f141a"/>
  <!-- terminal box outline -->
  <rect x="4" y="6" width="24" height="20" rx="3" fill="none" stroke="#49b8b8" stroke-width="2.4"/>
  <!-- title bar dots -->
  <circle cx="9" cy="10.5" r="1.2" fill="#49b8b8" opacity="0.5"/>
  <circle cx="13" cy="10.5" r="1.2" fill="#49b8b8" opacity="0.5"/>
  <!-- divider below title bar -->
  <line x1="4" y1="14" x2="28" y2="14" stroke="#49b8b8" stroke-width="0.8" opacity="0.3"/>
  <!-- small chevron prompt inside -->
  <polyline points="9,18 13,21 9,24" fill="none" stroke="#49b8b8" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
